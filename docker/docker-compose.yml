services:
  postgres:
    image: postgres:16
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aiops
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d aiops"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node-api
  node-api:
    build:
      context: ../apps/api

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aiops
      DB_USER: admin
      DB_PASSWORD: password

    ports:
      - "3000:3000"

    depends_on:
      - postgres
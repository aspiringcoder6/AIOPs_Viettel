services:
  postgres:
    image: postgres:16
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aiops
    command: 
      - "postgres"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d aiops"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  prometheus:
    image: prom/prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - node-api
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest

    ports:
      - "8080:8080"

    privileged: true

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node-api
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false

    ports:
      - "9200:9200"

    mem_limit: 1g
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4

    ports:
      - "5601:5601"

    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

    depends_on:
      - elasticsearch
  node-api:
    build:
      context: ../apps/api

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aiops
      DB_USER: admin
      DB_PASSWORD: password

    ports:
      - "3000:3000"

    depends_on:
      - postgres

  collector:
    build:
      context: ../apps/collector

    environment:
      ELASTIC_URL: http://elasticsearch:9200

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    depends_on:
      - elasticsearch
      - node-api

  detector:
    build:
      context: ../apps/detector

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aiops
      DB_USER: admin
      DB_PASSWORD: password
      PROMETHEUS_URL: http://prometheus:9090
      EVENT_COOLDOWN_SECONDS: 120

    depends_on:
      - postgres
      - prometheus

  context-builder:
    build:
      context: ../apps/context-builder

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aiops
      DB_USER: admin
      DB_PASSWORD: password
      PROMETHEUS_URL: http://prometheus:9090
      ELASTIC_URL: http://elasticsearch:9200

    depends_on:
      - postgres
      - prometheus
      - elasticsearch

  agent:
    build:
      context: ../apps/agent

    env_file:
      - .env

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aiops
      DB_USER: admin
      DB_PASSWORD: password
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      GROQ_API_URL: ${GROQ_API_URL:-https://api.groq.com/openai/v1}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-20b}

    depends_on:
      - postgres
      - context-builder

  alert-manager:
    build:
      context: ../apps/alert-manager

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aiops
      DB_USER: admin
      DB_PASSWORD: password

    depends_on:
      - postgres
      - agent

  cli:
    build:
      context: ../apps/cli

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aiops
      DB_USER: admin
      DB_PASSWORD: password

    depends_on:
      - postgres

  dashboard-api:
    build:
      context: ../apps/dashboard-api

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aiops
      DB_USER: admin
      DB_PASSWORD: password
      CORS_ORIGIN: http://localhost:5173

    ports:
      - "3100:3100"

    depends_on:
      - postgres

  dashboard:
    build:
      context: ../apps/dashboard

    environment:
      VITE_API_URL: http://localhost:3100/api

    ports:
      - "5173:5173"

    depends_on:
      - dashboard-api
